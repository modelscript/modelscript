services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/packages/api/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  morsel:
    build:
      context: .
      dockerfile: packages/morsel/Dockerfile
    ports:
      - "5173:3000"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

  ide:
    build:
      context: .
      dockerfile: packages/ide/Dockerfile
    ports:
      - "3200:3200"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3200
    restart: unless-stopped

volumes:
  api-data:
