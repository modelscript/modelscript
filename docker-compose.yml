services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=modelscript_historian
      - POSTGRES_USER=modelscript
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-modelscript}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./config/init-timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelscript -d modelscript_historian"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/modelscript/api:latest
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/apps/api/data
    depends_on:
      mqtt:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MQTT_BROKER_URL=mqtt://mqtt:1883
      - TIMESCALE_URL=postgresql://modelscript:${TIMESCALE_PASSWORD:-modelscript}@timescaledb:5432/modelscript_historian
    restart: unless-stopped

  morsel:
    image: ghcr.io/modelscript/morsel:latest
    build:
      context: .
      target: morsel
    ports:
      - "3002:3002"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped

  web:
    image: ghcr.io/modelscript/web:latest
    build:
      context: .
      target: web
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  ide:
    image: ghcr.io/modelscript/ide:latest
    build:
      context: .
      target: ide
    ports:
      - "3003:3003"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3003
    restart: unless-stopped

volumes:
  api-data:
  mqtt-data:
  timescale-data:
