services:
  api:
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/packages/api/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  morsel:
    build:
      context: .
      target: morsel
    ports:
      - "5173:3000"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

  ide:
    build:
      context: .
      target: ide
    ports:
      - "3200:3200"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3200
    restart: unless-stopped

volumes:
  api-data:
