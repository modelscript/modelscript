services:
  api:
    image: ghcr.io/modelscript/api:latest
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/packages/api/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  morsel:
    image: ghcr.io/modelscript/morsel:latest
    build:
      context: .
      target: morsel
    ports:
      - "3002:3002"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped

  web:
    image: ghcr.io/modelscript/web:latest
    build:
      context: .
      target: web
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  ide:
    image: ghcr.io/modelscript/ide:latest
    build:
      context: .
      target: ide
    ports:
      - "3003:3003"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3003
    restart: unless-stopped

volumes:
  api-data:
