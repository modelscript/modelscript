# Mosquitto MQTT broker configuration for ModelScript co-simulation.
# ISA-95 Unified Namespace topics flow through this broker.

# MQTT listener (for server-side components)
listener 1883
protocol mqtt

# WebSocket listener (for browser clients: Morsel, IDE)
listener 9001
protocol websockets

# Allow anonymous connections for development
allow_anonymous true

# Persistence for retained messages (participant birth certificates)
persistence true
persistence_location /mosquitto/data/
