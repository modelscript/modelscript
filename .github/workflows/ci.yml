name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_test_lint_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Cache MSL
        id: cache-msl
        uses: actions/cache@v4
        with:
          path: scripts/ModelicaStandardLibrary_v4.1.0.zip
          key: ${{ runner.os }}-msl-v4.1.0
      - name: Install Dependencies
        run: npm ci
      - name: Download MSL
        run: node scripts/download-msl.cjs
      - name: Run Build
        run: npx lerna run build
      - name: Run Tests
        run: npx lerna run test
        if: always()
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "**/ctrf/*.json"
        if: always()
      - name: Run Lint
        run: npx lerna run lint
      - name: Package VS Code Extension
        run: npx @vscode/vsce package --no-dependencies
        working-directory: packages/vscode
      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelscript-vsix
          path: packages/vscode/*.vsix
      - name: SPA fallback for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cp packages/morsel/build/client/index.html packages/morsel/build/client/404.html
          cp packages/site/build/client/index.html packages/site/build/client/404.html
      - name: Deploy Morsel
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          personal_token: ${{ secrets.MODELSCRIPT_MORSEL_DEPLOY_PAT }}
          external_repository: modelscript-morsel/modelscript-morsel.github.io
          publish_dir: ./packages/morsel/build/client
      - name: Deploy Site
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          personal_token: ${{ secrets.MODELSCRIPT_SITE_DEPLOY_PAT }}
          external_repository: modelscript/modelscript.github.io
          publish_dir: ./packages/site/build/client
      - name: Cache WebLLM Model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: packages/ide/models
          key: ${{ runner.os }}-qwen3-0.6b-q4f16_1-mlc-v2
      - name: Download WebLLM Model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: bash packages/ide/scripts/download-model.sh
      - name: Build IDE Static
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: npm run build-static --workspace=@modelscript/ide
      - name: Copy model to IDE static output
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          mkdir -p packages/ide/dist/static/api/models/Qwen3-0.6B-q4f16_1-MLC/resolve/main
          cp packages/ide/models/Qwen3-0.6B-q4f16_1-ctx4k_cs1k-webgpu.wasm packages/ide/dist/static/api/models/
          cp packages/ide/models/Qwen3-0.6B-q4f16_1-MLC/*.json packages/ide/dist/static/api/models/Qwen3-0.6B-q4f16_1-MLC/resolve/main/
          cp packages/ide/models/Qwen3-0.6B-q4f16_1-MLC/*.bin packages/ide/dist/static/api/models/Qwen3-0.6B-q4f16_1-MLC/resolve/main/
          cp packages/ide/models/Qwen3-0.6B-q4f16_1-MLC/*.txt packages/ide/dist/static/api/models/Qwen3-0.6B-q4f16_1-MLC/resolve/main/ 2>/dev/null || true
      - name: Deploy IDE
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          personal_token: ${{ secrets.MODELSCRIPT_IDE_DEPLOY_PAT }}
          external_repository: modelscript-ide/modelscript-ide.github.io
          publish_dir: ./packages/ide/dist/static
      # --- Docker ---
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        uses: docker/bake-action@v6
        with:
          source: .
          files: docker-compose.yml
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.args.PREBUILT=true
