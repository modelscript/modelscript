name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_test_lint_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Cache MSL
        id: cache-msl
        uses: actions/cache@v4
        with:
          path: scripts/ModelicaStandardLibrary_v4.1.0.zip
          key: ${{ runner.os }}-msl-v4.1.0
      - name: Install Dependencies
        run: npm ci
        env:
          CXXFLAGS: "-std=c++20"
      - name: Download MSL
        run: node scripts/download-msl.cjs
      - name: Run Build
        run: npm run build
      - name: Run Tests
        run: npm run test
        if: always()
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "**/ctrf/*.json"
        if: always()
      - name: Run Lint
        run: npm run lint
      - name: Package VS Code Extension
        run: npx @vscode/vsce package --no-dependencies
        working-directory: packages/vscode
      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelscript-vsix
          path: packages/vscode/*.vsix
      - name: SPA fallback for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cp packages/site/build/client/index.html packages/site/build/client/404.html
      - name: Deploy Site
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          personal_token: ${{ secrets.MODELSCRIPT_SITE_DEPLOY_PAT }}
          external_repository: modelscript/modelscript.github.io
          publish_dir: ./packages/site/build/client

      # --- Docker ---
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        uses: docker/bake-action@v6
        with:
          source: .
          files: docker-compose.yml
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.args.PREBUILT=true
